[pytest]
pythonpath = nexusctl/src
testpaths = tests nexusctl/tests
norecursedirs = referenzen .git .pytest_cache __pycache__
addopts = --strict-markers --durations=25
markers =
    unit: fast isolated tests
    integration: tests that exercise real project layouts, filesystem flows, or multiple components
    e2e: end-to-end product flows
    slow: tests that are expected to take noticeably longer
    timeout_risk: tests that involve subprocesses, watchers, locks, sleeps, or other hang-prone behavior

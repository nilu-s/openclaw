schema_version: 1
skills:
- id: nexusctl_status
  description: Read Nexusctl status and identity context.
- id: nexusctl_goal_ops
  description: Read, measure, and evaluate goal definitions.
- id: nexusctl_feature_request_ops
  description: Create and inspect cross-domain feature requests.
- id: nexusctl_routing
  description: Route requests and administer domain handoffs.
- id: nexusctl_scope_control
  description: Grant and revoke bounded scope leases.
- id: nexusctl_work_planning
  description: Plan and assign software work.
- id: nexusctl_patch_proposal
  description: Submit scoped patch proposals.
- id: nexusctl_review
  description: Submit technical review verdicts.
- id: nexusctl_acceptance
  description: Submit business-domain acceptance verdicts.
- id: nexusctl_safety_veto
  description: Submit risk and safety vetoes.
- id: nexusctl_github_projection
  description: Sync Nexus state to GitHub through the GitHub App.
- id: nexusctl_github_reconciliation
  description: Verify GitHub webhooks and reconcile projection drift back to Nexusctl policy.
- id: openclaw_generation
  description: Generate OpenClaw runtime artifacts from Nexus design.
- id: runtime_integrity
  description: Validate generated runtime drift and backups.
- id: trading_evidence
  description: Attach trading evidence, measurements, and backtest references.
- id: nexusctl_merge_apply
  description: Apply approved merge gates through the Nexusctl GitHub App boundary.

name: nexusctl-ci

on:
  push:
    branches: [main]
    paths:
      - "nexusctl/**"
      - ".github/workflows/nexusctl-ci.yml"
  pull_request:
    paths:
      - "nexusctl/**"
      - ".github/workflows/nexusctl-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Package
        working-directory: nexusctl
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Tests
        working-directory: nexusctl
        run: pytest
